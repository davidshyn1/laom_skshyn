group: "idm-default"
seed: 0
wandb_dir: "/yj_hdd/skshyn/lam/wandb"

idm:
  total_updates: 10000
  batch_size: 512
  use_aug: False
  future_obs_offset: 1
  learning_rate: 0.0001
  weight_decay: 0.0
  warmup_epochs: 3
  act_head_dim: 1024
  act_head_dropout: 0.0
