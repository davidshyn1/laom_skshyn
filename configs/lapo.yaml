group: "lapo-default"
environment: "hopper-hop"
seed: 0
wandb_dir: "/home/irteam/data-vol1/wandb"
model_save_path: "/home/irteam/data-vol1/laom_model/hopper-hop/lapo.pt"

lapo:
  num_epochs: 10
  batch_size: 1024
  future_obs_offset: 10
  learning_rate: 0.0001
  weight_decay: 0.0
  warmup_epochs: 3
  latent_action_dim: 8192
  encoder_scale: 6
  encoder_num_res_blocks: 2
  encoder_deep: False
  frame_stack: 3
  # TODO: change to your data path
  data_path: "/home/irteam/data-vol1/laom_data/hopper-hop-500x-train_1to10_merged.hdf5"

bc:
  num_epochs: 10
  batch_size: 1024
  learning_rate: 0.0001
  weight_decay: 0.0 
  warmup_epochs: 0
  encoder_scale: 32  # or 8
  encoder_num_res_blocks: 2
  encoder_deep: False
  dropout: 0.0
  use_aug: False
  frame_stack: 3
  # TODO: change to your data and DAVIS path
  data_path: "/home/irteam/data-vol1/laom_data/hopper-hop-500x-train_1to10_merged.hdf5"
  dcs_backgrounds_path: "/home/irteam/data-vol1/DAVIS/JPEGImages/480p"
  dcs_backgrounds_split: "train"
  eval_episodes: 5
  eval_seed: 0

decoder:
  total_updates: 2500
  batch_size: 1024
